phases:
  specify:
    status: done
    summary: 6 requirements captured
    description: >
      Users need to export any list to a CSV file for use in spreadsheets and
      downstream tools. Export must stream so large lists don't exhaust memory.
    items:
      - id: US1
        title: As a user, I can export a visible list to CSV
        status: done
      - id: US2
        title: As a user, I get all columns currently shown, in order
        status: done
      - id: US3
        title: As an ops engineer, exports of 1M+ rows don't OOM the server
        status: done
  plan:
    status: done
    summary: Streaming export design approved
    description: >
      Stream rows through a Node Transform into a CSV encoder; back-pressure to
      the DB cursor. No full materialization. New ExportJob tracks progress.
    tech_context:
      language: TypeScript 5.7 / Node 22
      dependencies: Vite 5, Vitest 2, Firebase Web SDK lite
      storage: Firestore via existing early-access write path (no schema change)
      testing: Vitest + jsdom
      target_platform: Static pages on Firebase Hosting
      project_type: Vite multi-page static site
      performance: Export streams; no full materialization; p95 < 200ms first byte
      constraints: Back-pressure to DB cursor; bounded memory on 1M+ rows
      scale: ~25 list types; exports up to a few million rows
    constitution: pass
    structure_decision: >
      Single-project layout. Streaming logic lives in src/shared/ next to the
      existing export path so it shares the ExportJob taxonomy.
    complexity:
      - violation: Module-level ExportJob registry (one mutable map)
        why: Tracks in-flight jobs for progress polling; recreating per request loses state.
        rejected: A per-request object would drop progress between poll calls.
    items:
      - title: Row cursor over the list query (keyset pagination)
        status: done
      - title: CSV encoder Transform stream
        status: done
      - title: ExportJob state machine (queued → running → done/failed)
        status: done
